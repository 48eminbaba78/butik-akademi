<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koç Bul | Rostrum Akademi</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0e0c;
      --surface: #1a1916;
      --surface2: #242220;
      --border: #383430;
      --accent: #f0a500;
      --accent-dim: rgba(240, 165, 0, 0.12);
      --text: #f0ece6;
      --text-mid: #9a9088;
      --text-dim: #5a5450;
      --green: #3ecf8e;
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
      padding: 40px 20px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
    }

    h1 span {
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-mid);
      font-size: 15px;
    }

    /* SEARCH & FILTER */
    .filter-bar {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 30px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .filter-group {
      flex: 1;
      min-width: 200px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .filter-group label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-mid);
    }

    .filter-group input, .filter-group select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-group input:focus, .filter-group select:focus {
      border-color: var(--accent);
    }

    /* GRID */
    .coaches-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .coach-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      transition: all 0.2s;
    }

    .coach-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .coach-header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 16px;
    }

    .coach-avatar {
      width: 56px;
      height: 56px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      font-weight: 800;
      color: #0f0e0c;
      background-size: cover;
      background-position: center;
    }

    .coach-meta {
      flex: 1;
    }

    .coach-name {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
    }

    .coach-brand {
      font-size: 12px;
      color: var(--accent);
      margin-top: 2px;
    }

    .coach-subjects {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 14px;
    }

    .subject-badge {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 99px;
      text-transform: uppercase;
    }

    .coach-bio {
      font-size: 13px;
      color: var(--text-mid);
      margin-bottom: 20px;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .coach-actions {
      display: flex;
      gap: 8px;
    }

    .btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      font-family: inherit;
      border: none;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .btn-accent {
      background: var(--accent);
      color: #0f0e0c;
    }

    .btn-accent:hover {
      background: #fbb800;
    }

    .btn-ghost {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-mid);
    }

    .btn-ghost:hover {
      color: var(--text);
      border-color: var(--text-mid);
    }

    /* MODAL */
    .modal-bg {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-bg.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 540px;
      padding: 28px;
      position: relative;
      box-shadow: var(--shadow);
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      color: var(--text);
    }

    .modal h2 {
      font-family: 'Syne', sans-serif;
      margin-bottom: 20px;
    }

    .form-field {
      margin-bottom: 14px;
    }

    .form-field label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-mid);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-field input, .form-field select, .form-field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      font-family: inherit;
      outline: none;
    }

    .form-field input:focus, .form-field select:focus, .form-field textarea:focus {
      border-color: var(--accent);
    }

    .form-field textarea {
      resize: vertical;
      min-height: 80px;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 12px 24px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      opacity: 0;
      z-index: 1001;
      pointer-events: none;
      transition: all 0.3s;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Derin link (/koc/<slug>) ile gelindiğinde "Koç Bul" listesi bir an
       görünüp sonra profile geçmesin diye ilk boyamadan önce gizleniyor. */
    html.deep-link-boot .container { display: none; }
    html.deep-link-boot #showcaseContainer { display: flex !important; align-items: center; justify-content: center; min-height: 60vh; }
  </style>
  <script>
    // Sayfa daha boyanmadan (senkron) çalışır — .container'ın bir an görünmesini engeller.
    (function(){
      var qs = new URLSearchParams(location.search);
      var hasSlug = qs.get('koc') || qs.get('coach') || location.pathname.split('/').filter(Boolean).includes('koc');
      if (hasSlug) document.documentElement.classList.add('deep-link-boot');
    })();
  </script>
</head>
<body>

<div class="container">
  <header>
    <h1>Rostrum Akademi <span>Koç Bul</span></h1>
    <p class="subtitle">Hedeflerinize en uygun eğitim koçunu bulun ve hemen eşleşme başvurusu yapın.</p>
  </header>

  <div class="filter-bar">
    <div class="filter-group">
      <label for="searchName">Koç Adı / Marka</label>
      <input type="text" id="searchName" placeholder="Arama yapın..." oninput="filterCoaches()">
    </div>
    <div class="filter-group">
      <label for="searchSubject">Uzmanlık Dersi</label>
      <select id="searchSubject" onchange="filterCoaches()">
        <option value="">Tümü</option>
        <option value="Matematik">Matematik</option>
        <option value="Geometri">Geometri</option>
        <option value="Fizik">Fizik</option>
        <option value="Kimya">Kimya</option>
        <option value="Biyoloji">Biyoloji</option>
        <option value="Türkçe">Türkçe</option>
        <option value="Sosyal">Sosyal Bilimler</option>
      </select>
    </div>
  </div>

  <div id="coachesContainer" class="coaches-grid">
    <!-- Coaches list dynamically rendered here -->
  </div>
</div>

<!-- TEK-KOÇ VİTRİN (slug modu — aydınlık premium) -->
<div id="showcaseContainer" style="display:none">
  <div style="text-align:center;color:var(--text-mid);font-size:14px">Yükleniyor…</div>
</div>

<!-- PROFILE MODAL -->
<div id="profileModal" class="modal-bg" onclick="closeModal(event, 'profileModal')">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('profileModal').classList.remove('open')">✕</button>
    <div id="modalProfileContent"></div>
  </div>
</div>

<!-- APPLY FORM MODAL -->
<div id="applyModal" class="modal-bg" onclick="closeModal(event, 'applyModal')">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('applyModal').classList.remove('open')">✕</button>
    <h2>Eşleşme <span>Başvurusu</span></h2>
    <input type="hidden" id="applyCoachId">
    
    <div class="form-field">
      <label>Adınız Soyadınız</label>
      <input type="text" id="applyName" placeholder="Öğrencinin adı soyadı" required>
    </div>
    
    <div class="form-field">
      <label>E-posta Adresiniz</label>
      <input type="email" id="applyEmail" placeholder="iletisim@örnek.com" required>
    </div>
    
    <div class="form-field">
      <label>Telefon Numaranız</label>
      <input type="tel" id="applyPhone" placeholder="0555 555 5555" required>
    </div>
    
    <div class="form-field">
      <label>Sınav Grubu / Profil</label>
      <select id="applyProfile">
        <optgroup label="YKS (Üniversiteye Hazırlık)">
          <option value="YKS Sayısal">YKS — Sayısal (MF)</option>
          <option value="YKS Sözel">YKS — Sözel (TM/TS)</option>
          <option value="YKS Eşit Ağırlık">YKS — Eşit Ağırlık (TM)</option>
          <option value="YKS Sadece TYT">YKS — Sadece TYT</option>
        </optgroup>
        <optgroup label="Diğer Sınavlar">
          <option value="LGS">LGS (Lise Giriş Sınavı)</option>
          <option value="KPSS">KPSS (Kamu Personeli Sınavı)</option>
          <option value="ALES">ALES</option>
          <option value="DGS">DGS</option>
        </optgroup>
      </select>
    </div>
    
    <div class="form-field">
      <label>Özel Tercih / İstediğiniz Koçluk Tarzı</label>
      <input type="text" id="applyStyle" placeholder="Örn: Disiplinli, Arkadaş canlısı, Haftada 2 görüşme...">
    </div>
    
    <button class="btn btn-accent" style="width: 100%; margin-top: 10px; padding: 14px" onclick="submitApplication()">Başvuruyu Gönder</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const SB_URL = 'https://imyhenrwmsmyikpollur.supabase.co';
  const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlteWhlbnJ3bXNteWlrcG9sbHVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDE3ODYsImV4cCI6MjA5NTcxNzc4Nn0._ySJ5ArD1GYthyitHjdyEjLaUhextIwEqpRoF5ScI34';
  const db = supabase.createClient(SB_URL, SB_KEY);
  
  let allCoaches = [];
  
  async function loadCoaches() {
    try {
      const { data: users, error: usersErr } = await db.from('users').select('id, full_name, color, target').eq('role', 'coach');
      if (usersErr) throw usersErr;
      
      let { data: profiles, error: profErr } = await db.from('coach_profiles').select('*').eq('published', true);
      if (profErr && /column/i.test(profErr.message || '')) {
        // migration_v37 henüz çalıştırılmamış — published kolonu yok, filtresiz devam et
        ({ data: profiles, error: profErr } = await db.from('coach_profiles').select('*'));
      }
      if (profErr) throw profErr;
      
      const profileMap = {};
      (profiles || []).forEach(p => { profileMap[p.id] = p; });
      
      // Merge local storage overrides
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('coach_profile_')) {
          const uId = key.replace('coach_profile_', '');
          try {
            const cached = JSON.parse(localStorage.getItem(key));
            if (cached) {
              profileMap[uId] = { ...(profileMap[uId] || {}), ...cached };
            }
          } catch(e) {}
        }
      }
      
      allCoaches = (users || []).map(u => ({
        id: u.id,
        name: u.full_name,
        color: u.color || '#f0a500',
        brand: u.target || 'Rostrum Akademi Koçu',
        profile: profileMap[u.id] || {}
      }));
      
      renderCoaches(allCoaches);
    } catch(e) {
      console.error('loadCoaches error:', e);
      showToast('Koçlar yüklenirken hata oluştu.');
    }
  }
  
  function renderCoaches(coaches) {
    const container = document.getElementById('coachesContainer');
    if (coaches.length === 0) {
      container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: var(--text-mid); padding: 40px;">Aranan kriterlere uygun koç bulunamadı.</div>';
      return;
    }
    
    container.innerHTML = coaches.map(c => {
      const bio = c.profile.bio || 'Henüz biyografi eklenmemiş.';
      const subjects = (c.profile.subjects || 'Genel Koçluk').split(',').map(s => s.trim()).filter(Boolean);
      const avatarStyle = c.profile.photo_url ? `background-image: url('${c.profile.photo_url}')` : `background: ${c.color}`;
      const avatarChar = c.profile.photo_url ? '' : c.name[0];
      
      return `
        <div class="coach-card">
          <div class="coach-header">
            <div class="coach-avatar" style="${avatarStyle}">${avatarChar}</div>
            <div class="coach-meta">
              <div class="coach-name">${esc(c.name)}</div>
              <div class="coach-brand">${esc(c.brand)}</div>
            </div>
          </div>
          
          <div class="coach-subjects">
            ${subjects.map(s => `<span class="subject-badge">${esc(s)}</span>`).join('')}
          </div>
          
          <div class="coach-bio">${esc(bio)}</div>
          
          <div class="coach-actions">
            <button class="btn btn-ghost" onclick="viewCoachDetails('${c.id}')">Profili Gör</button>
            <button class="btn btn-accent" onclick="openApplyModal('${c.id}')">Başvur</button>
          </div>
        </div>
      `;
    }).join('');
  }
  
  function filterCoaches() {
    const nameQ = document.getElementById('searchName').value.trim().toLowerCase();
    const subjectQ = document.getElementById('searchSubject').value.trim().toLowerCase();
    
    const filtered = allCoaches.filter(c => {
      const matchesName = c.name.toLowerCase().includes(nameQ) || c.brand.toLowerCase().includes(nameQ);
      const matchesSubject = !subjectQ || (c.profile.subjects || '').toLowerCase().includes(subjectQ);
      return matchesName && matchesSubject;
    });
    
    renderCoaches(filtered);
  }
  
  function viewCoachDetails(coachId) {
    const c = allCoaches.find(x => x.id === coachId);
    if (!c) return;
    
    const bio = c.profile.bio || 'Biyografi belirtilmemiş.';
    const experience = c.profile.experience || 'Deneyim belirtilmemiş.';
    const education = c.profile.education || 'Eğitim bilgisi belirtilmemiş.';
    const insta = c.profile.instagram ? `<p style="margin-top:6px">📸 Instagram: <a href="https://instagram.com/${esc(c.profile.instagram)}" target="_blank" style="color:var(--accent); text-decoration:none">@${esc(c.profile.instagram)}</a></p>` : '';
    const linkedin = c.profile.linkedin ? `<p style="margin-top:4px">💼 LinkedIn: <a href="${esc(c.profile.linkedin)}" target="_blank" style="color:var(--accent); text-decoration:none">Profil Linki →</a></p>` : '';
    const avatarStyle = c.profile.photo_url ? `background-image: url('${c.profile.photo_url}')` : `background: ${c.color}`;
    const avatarChar = c.profile.photo_url ? '' : c.name[0];

    const content = `
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px; padding-bottom:16px; border-bottom: 1px solid var(--border)">
        <div class="coach-avatar" style="${avatarStyle}">${avatarChar}</div>
        <div>
          <h2 style="margin:0">${esc(c.name)}</h2>
          <div style="color:var(--accent); font-size:13px; font-weight:700">${esc(c.brand)}</div>
        </div>
      </div>
      <div style="font-size:14px; line-height:1.6; display:flex; flex-direction:column; gap:14px">
        <div>
          <b style="color:var(--accent); font-size:11px; text-transform:uppercase; letter-spacing:0.5px">Hakkında</b>
          <p style="margin-top:4px; color:var(--text-mid)">${esc(bio).replace(/\n/g, '<br>')}</p>
        </div>
        <div>
          <b style="color:var(--accent); font-size:11px; text-transform:uppercase; letter-spacing:0.5px">Deneyim</b>
          <p style="margin-top:4px; color:var(--text-mid)">${esc(experience).replace(/\n/g, '<br>')}</p>
        </div>
        <div>
          <b style="color:var(--accent); font-size:11px; text-transform:uppercase; letter-spacing:0.5px">Eğitim</b>
          <p style="margin-top:4px; color:var(--text-mid)">${esc(education).replace(/\n/g, '<br>')}</p>
        </div>
        ${insta || linkedin ? `
        <div>
          <b style="color:var(--accent); font-size:11px; text-transform:uppercase; letter-spacing:0.5px">Sosyal Medya / İletişim</b>
          ${insta}
          ${linkedin}
        </div>` : ''}
      </div>
      <button class="btn btn-accent" style="width:100%; margin-top:24px; padding:12px" onclick="document.getElementById('profileModal').classList.remove('open'); openApplyModal('${c.id}')">Eşleşme Başvurusu Yap</button>
    `;
    
    document.getElementById('modalProfileContent').innerHTML = content;
    document.getElementById('profileModal').classList.add('open');
  }
  
  function openApplyModal(coachId) {
    document.getElementById('applyCoachId').value = coachId;
    document.getElementById('applyModal').classList.add('open');
  }
  
  async function submitApplication() {
    const coachId = document.getElementById('applyCoachId').value;
    const name = document.getElementById('applyName').value.trim();
    const email = document.getElementById('applyEmail').value.trim();
    const phone = document.getElementById('applyPhone').value.trim();
    const exam = document.getElementById('applyProfile').value;
    const style = document.getElementById('applyStyle').value.trim();
    
    if (!name || !email || !phone) {
      showToast('Lütfen zorunlu alanları doldurun!');
      return;
    }
    
    try {
      const { error } = await db.from('match_requests').insert({
        student_name: name,
        email,
        phone,
        exam_profile: exam,
        style,
        status: 'pending',
        matched_coach_id: coachId
      });
      
      if (error) throw error;
      
      showToast('Eşleşme başvurunuz başarıyla alındı! Koçunuz sizinle iletişime geçecektir.');
      document.getElementById('applyModal').classList.remove('open');
      
      // Clear inputs
      document.getElementById('applyName').value = '';
      document.getElementById('applyEmail').value = '';
      document.getElementById('applyPhone').value = '';
      document.getElementById('applyStyle').value = '';
    } catch(e) {
      console.error('submitApplication error:', e);
      showToast('Başvuru gönderilirken hata oluştu: ' + e.message);
    }
  }

  function closeModal(e, modalId) {
    if (e.target === document.getElementById(modalId)) {
      document.getElementById(modalId).classList.remove('open');
    }
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4000);
  }

  function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
  }

  // Derin link: /koc/<slug> (rewrite ?koc=) veya eski ?coach=<uuid> — profili doğrudan aç
  async function openDeepLink() {
    const params = new URLSearchParams(location.search);
    let slugParam = (params.get('koc') || '').toLowerCase().trim();
    const coachParam = (params.get('coach') || '').trim();
    
    // URL rewrite fallback: extract slug from pathname (e.g. /koc/slug-name)
    if (!slugParam) {
      const pathParts = location.pathname.split('/');
      const kocIdx = pathParts.indexOf('koc');
      if (kocIdx !== -1 && pathParts[kocIdx + 1]) {
        slugParam = pathParts[kocIdx + 1].toLowerCase().trim();
      }
    }

    if (!slugParam && !coachParam) return;
    let target = null;
    if (slugParam) {
      target = allCoaches.find(c => (c.profile.slug || '').toLowerCase() === slugParam);
      if (!target) {
        try {
          const { data } = await db.rpc('get_coach_by_slug', { p_slug: slugParam });
          if (data && data.length) {
            target = {
              id: data[0].id,
              name: data[0].full_name,
              color: data[0].color || '#f0a500',
              brand: data[0].target || 'Rostrum Akademi Koçu',
              profile: {
                bio: data[0].bio,
                subjects: data[0].subjects,
                education: data[0].education,
                experience: data[0].experience,
                photo_url: data[0].photo_url,
                instagram: data[0].instagram,
                linkedin: data[0].linkedin,
                slug: data[0].slug,
                headline: data[0].headline,
                capacity_left: data[0].capacity_left,
                pricing_text: data[0].pricing_text,
                whatsapp_number: data[0].whatsapp_number,
                reviews: data[0].reviews,
                faq: data[0].faq,
                custom_features: data[0].custom_features,
                blocks: data[0].blocks,
                yks_rank: data[0].yks_rank,
                university: data[0].university,
                department: data[0].department,
                profession: data[0].profession,
                experience_years: data[0].experience_years,
                institution: data[0].institution
              }
            };
          } else {
            // RPC role filter fallback for developers or hidden coaches (direct fetch)
            let { data: p, error: pErr } = await db.from('coach_profiles').select('*').eq('slug', slugParam).eq('published', true).maybeSingle();
            if (pErr && /column/i.test(pErr.message || '')) {
              ({ data: p } = await db.from('coach_profiles').select('*').eq('slug', slugParam).maybeSingle());
            }
            if (p) {
              const { data: u } = await db.from('users').select('id, full_name, color, target').eq('id', p.id).single();
              if (u) {
                target = {
                  id: u.id,
                  name: u.full_name,
                  color: u.color || '#f0a500',
                  brand: u.target || 'Rostrum Akademi Koçu',
                  profile: p
                };
              }
            }
          }
        } catch(e) {}
      }
    } else if (coachParam) {
      target = allCoaches.find(c => c.id === coachParam);
      if (!target) {
        try {
          const { data: u } = await db.from('users').select('id, full_name, color, target').eq('id', coachParam).single();
          if (u) {
            let { data: p, error: pErr2 } = await db.from('coach_profiles').select('*').eq('id', coachParam).eq('published', true).maybeSingle();
            if (pErr2 && /column/i.test(pErr2.message || '')) {
              ({ data: p } = await db.from('coach_profiles').select('*').eq('id', coachParam).maybeSingle());
            }
            target = {
              id: u.id,
              name: u.full_name,
              color: u.color || '#f0a500',
              brand: u.target || 'Rostrum Akademi Koçu',
              profile: p || {}
            };
          }
        } catch(e) {}
      }
    }
    if (target) {
      // Slug ile gelen = kamu vitrini (tam ekran). ?coach=uuid eski yol = modal.
      if (slugParam) renderCoachShowcase(target);
      else viewCoachDetails(target.id);
    } else if (slugParam) {
      // Profil bulunamadı — spinner'da asılı kalmasın, normal listeye dön
      document.documentElement.classList.remove('deep-link-boot');
      document.getElementById('showcaseContainer').style.display = 'none';
      showToast('Bu linkte bir koç profili bulunamadı.');
    }
  }

  // ─────────────────────────────────────────────────────────────
  // TEK-KOÇ KAMU VİTRİNİ — Instagram bio linki satış hunisi
  // ─────────────────────────────────────────────────────────────
  // ─────────────────────────────────────────────────────────────
  // TEK-KOÇ KAMU VİTRİNİ — Instagram bio linki satış hunisi & Reklam Sayfası
  // ─────────────────────────────────────────────────────────────
  // ─────────────────────────────────────────────────────────────
  // TEK-KOÇ KAMU VİTRİNİ — Modüler, Dönüşüm Odaklı Satış Hunisi
  // Apple & Linear Seviyesi Tasarım Mimarisi
  // ─────────────────────────────────────────────────────────────
  function renderCoachShowcase(c) {
    document.querySelector('.container').style.display = 'none';
    document.title = `${c.name} — Rostrum Uzman Profil`;
    const p = c.profile || {};
    const initials = (c.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

    // YKS Özel Alanları & Otomatik Adaptif Hiyerarşi Engine
    const yksRank = p.yks_rank || '';
    const university = p.university || '';
    const department = p.department || '';
    const profession = p.profession || '';
    const expYears = p.experience_years || '';
    const institution = p.institution || '';

    // Otomatik Koç Tipi Tespiti ve Üst Rozet Önceliklendirme
    let archetypeBadge = '';
    let subHeadline = '';

    if (yksRank || university || department) {
      // Öğrenci Koçu Hiyerarşisi
      archetypeBadge = yksRank ? `🏆 YKS ${yksRank}` : (university ? `🎓 ${university}` : '🎓 YKS Derece Koçu');
      const uniText = [university, department].filter(Boolean).join(' · ');
      subHeadline = uniText || p.headline || (p.subjects ? p.subjects.split(',').slice(0, 2).join(' · ') + ' Koçu' : 'YKS Derece & Başarı Koçu 🚀');
    } else if (profession || expYears || institution) {
      // Profesyonel Eğitim Koçu Hiyerarşisi
      archetypeBadge = profession ? `💼 ${profession}` : (expYears ? `🏅 ${expYears} Deneyim` : '💼 Uzman Eğitim Koçu');
      const proText = [institution, expYears ? `${expYears} Deneyim` : ''].filter(Boolean).join(' · ');
      subHeadline = proText || p.headline || (p.subjects ? p.subjects.split(',').slice(0, 2).join(' · ') + ' Rehberlik' : 'Eğitim & PDR Danışmanı 🚀');
    } else {
      archetypeBadge = '🎓 YKS Uzman Koç';
      subHeadline = p.headline || (p.subjects ? p.subjects.split(',').slice(0, 2).join(' · ') + ' Koçu' : 'YKS Başarı & Rehberlik Koçu 🚀');
    }

    // Standart / Özelleştirilmiş Modüler Bloklar
    const defaultBlocks = [
      { id: 'hero', enabled: true },
      { id: 'stats', enabled: true },
      { id: 'value_props', enabled: true },
      { id: 'tabs_about', enabled: true },
      { id: 'reviews', enabled: true },
      { id: 'faq', enabled: true },
      { id: 'sticky_cta', enabled: true }
    ];
    const activeBlocks = Array.isArray(p.blocks) && p.blocks.length ? p.blocks : defaultBlocks;

    // Stat Rozetleri (Dinamik & Dolu Olanlar)
    const stats = [];
    if (yksRank) stats.push({ ico: '🏆', t: `YKS Derecesi: ${yksRank}`, highlight: true });
    if (profession) stats.push({ ico: '💼', t: profession, highlight: true });
    if (university) stats.push({ ico: '🎓', t: university });
    if (expYears) stats.push({ ico: '🏅', t: `${expYears} Deneyim` });
    if (p.pricing_text) stats.push({ ico: '🏷️', t: p.pricing_text });
    if (p.capacity_left != null && p.capacity_left >= 0)
      stats.push({ ico: '', t: `Son ${p.capacity_left} Kontenjan`, scarce: true });
    else
      stats.push({ ico: '⚡', t: 'Kontenjan Kısıtlı', scarce: true });

    // Dinamik Yorumlar & SSS
    const customReviews = Array.isArray(p.reviews) ? p.reviews.filter(r => r && (r.name || r.text)) : [];
    const customFaqs = Array.isArray(p.faq) ? p.faq.filter(f => f && f.q && f.a) : [];

    // Sosyal medya butonları
    const social = [];
    if (p.instagram) social.push(`<a href="https://instagram.com/${esc(p.instagram)}" target="_blank" class="sc-social">📸 @${esc(p.instagram)}</a>`);
    if (p.linkedin) social.push(`<a href="${esc(p.linkedin)}" target="_blank" class="sc-social">💼 LinkedIn</a>`);
    social.push(`<span class="sc-reply-badge">⚡ Anında İletişim</span>`);

    // Avatar
    const avatar = p.photo_url
      ? `<div class="sc-av" style="background-image:url('${esc(p.photo_url)}')"><span class="sc-online-dot"></span></div>`

    document.documentElement.classList.remove('deep-link-boot');
    const sc = document.getElementById('showcaseContainer');
    sc.style.display = 'block';

    // HTML Blok Oluşturucuları
    const blockRenderers = {
      hero: () => `
        <div class="sc-hero">
          ${avatar}
          <div style="min-width:0;padding-top:2px">
            <div class="sc-name-row">
              <div class="sc-name">${esc(c.name)}</div>

                <svg viewBox="0 0 12 12"><path d="M5 8.5L2.5 6l.7-.7L5 7.1l3.8-3.8.7.7z"/></svg>

              </div>
            </div>
            <div class="sc-headline">${esc(subHeadline)}</div>
            <div class="sc-socials">${social.join('')}</div>
          </div>
        </div>`,

      stats: () => stats.length ? `
        <div class="sc-stats-wrap" id="scStatsWrap">
          <div class="sc-stats" id="scStats">
            ${stats.map(s => `
              <div class="sc-stat${s.scarce ? ' sc-scarce' : ''}${s.highlight ? ' sc-highlight' : ''}">
                ${s.scarce ? '<span class="sc-dot"></span>' : `<span class="sc-stat-ico">${s.ico}</span>`}
                <span>${esc(s.t)}</span>
              </div>`).join('')}
          </div>
        </div>` : '',

      value_props: () => `
        <div class="sc-features">
          <div class="sc-sec-title">Neden <span>${esc(c.name.split(' ')[0])}</span> İle Çalışmalısın?</div>
          <div class="sc-feat-grid">
            <div class="sc-feat-card">
              <div class="sc-feat-ico">🎯</div>
              <div class="sc-feat-head">%100 Kişiye Özel Yol Haritası</div>
              <div class="sc-feat-desc">Hedeflerine ve ihtiyaçlarına özel gün gün yapılandırılmış strateji.</div>
            </div>
            <div class="sc-feat-card">
              <div class="sc-feat-ico">📊</div>
              <div class="sc-feat-head">Düzenli Gelişim Takibi</div>
              <div class="sc-feat-desc">Performans analizi ve zayıf alanların anlık tespiti.</div>
            </div>
            <div class="sc-feat-card">
              <div class="sc-feat-ico">🤖</div>
              <div class="sc-feat-head">7/24 AI Dijital Asistan</div>
              <div class="sc-feat-desc">Dijital panelde kesintisiz rehberlik ve anlık yanıt desteği.</div>
            </div>
            <div class="sc-feat-card">
              <div class="sc-feat-ico">💬</div>
              <div class="sc-feat-head">Birebir Görüşme & Takip</div>
              <div class="sc-feat-desc">Haftalık görüntülü seanslar ve kesintisiz WhatsApp takibi.</div>
            </div>
          </div>
        </div>`,

      tabs_about: () => `
        <div class="sc-tabs">
          <button class="sc-tab on" data-t="bio" onclick="scTab('bio')">Biyografi</button>
          <button class="sc-tab" data-t="edu" onclick="scTab('edu')">Eğitim</button>
          <button class="sc-tab" data-t="exp" onclick="scTab('exp')">Deneyim</button>
        </div>
        <div class="sc-panel" id="scPanel">${esc(p.bio || 'Biyografi henüz eklenmedi.').replace(/\n/g, '<br>')}</div>`,

      reviews: () => customReviews.length ? `
        <div class="sc-reviews">
          <div class="sc-sec-title">Danışan &amp; Öğrenci <span>Görüşleri</span></div>
          ${customReviews.map(r => `
            <div class="sc-rev-card">
              <div class="sc-rev-stars">${'★'.repeat(r.stars || 5)}</div>
              <div class="sc-rev-text">"${esc(r.text)}"</div>
              <div class="sc-rev-user">🎓 ${esc(r.name)}${r.role ? ` · ${esc(r.role)}` : ''}</div>
            </div>
          `).join('')}
        </div>` : '',

      faq: () => customFaqs.length ? `
        <div class="sc-faq">
          <div class="sc-sec-title">Sıkça Sorulan <span>Sorular</span></div>
          ${customFaqs.map(f => `
            <div class="sc-faq-item" onclick="this.classList.toggle('open')">
              <div class="sc-faq-q"><span>${esc(f.q)}</span> <span>▾</span></div>
              <div class="sc-faq-a">${esc(f.a)}</div>
            </div>
          `).join('')}
        </div>` : '',

      sticky_cta: () => `
        <div class="sc-cta-wrap">
          <button class="sc-cta" onclick="openScApply()">🔥 Ücretsiz Tanışma &amp; Başvuru Yap →</button>
        </div>`
    };

    // Modüler İçerik Derleme
    const bodyHtml = activeBlocks
      .filter(b => b.enabled !== false && blockRenderers[b.id])
      .map(b => blockRenderers[b.id]())
      .join('');

    sc.innerHTML = `

        .sc-sheet-handle{width:36px;height:4px;border-radius:99px;background:var(--bd);margin:0 auto 16px}
        .sc-sheet h3{font-size:18px;font-weight:800;margin-bottom:4px;color:var(--ink)}
        .sc-sheet p{font-size:12px;color:var(--mid);margin-bottom:18px;line-height:1.5}
        .sc-f{margin-bottom:12px}
        .sc-f label{display:block;font-size:10.5px;font-weight:700;color:var(--mid);
          text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
        .sc-f input,.sc-f textarea{
          width:100%;background:var(--surf2);border:1px solid var(--bd);
          border-radius:11px;padding:12px 14px;font-size:14px;
          font-family:inherit;color:var(--ink);outline:none;box-sizing:border-box;
          -webkit-appearance:none;
        }
        .sc-f input:focus,.sc-f textarea:focus{border-color:var(--b)}
        .sc-opt{font-weight:400;text-transform:none;color:var(--dim)}
      </style>

      <!-- Top Brand Bar -->
      <div class="sc-top-bar">
        <span>🎓 Rostrum Akademi</span> · Doğrulanmış Uzman Profil
      </div>

      ${bodyHtml}

      <!-- Brand Footer -->
      <div class="sc-brand-foot">🎓 <b>Rostrum</b> dijital altyapısıyla güçlendirilmiştir</div>

      <!-- Apply sheet -->
      <div id="scApplySheet" onclick="if(event.target===this)this.classList.remove('on')">
        <div class="sc-sheet">
          <div class="sc-sheet-handle"></div>
          <h3>Ön Başvuru Yap</h3>
          <p><b>${esc(c.name)}</b> ile çalışmak için bilgilerini bırak — en kısa sürede seninle iletişime geçilecek.</p>
          <input type="hidden" id="scApplyCoach" value="${esc(c.id)}">
          <div class="sc-f"><label>Adın Soyadın</label><input type="text" id="scName" placeholder="Ad Soyad"></div>
          <div class="sc-f"><label>WhatsApp Numaran</label><input type="tel" id="scPhone" placeholder="0 (5__) ___ __ __" oninput="scMaskPhone(this)"></div>
          <div class="sc-f"><label>E-posta <span class="sc-opt">(opsiyonel)</span></label><input type="email" id="scEmail" placeholder="ornek@gmail.com"></div>
          <div class="sc-f"><label>Hedefin &amp; İhtiyacın</label><textarea id="scGoal" rows="2" placeholder="Örn: YKS Hazırlık, Yazılım Mentörlüğü, Kariyer Danışmanlığı"></textarea></div>
          <button class="sc-cta" style="position:static;box-shadow:none;margin-top:6px;width:100%" onclick="submitScApply()">Başvuruyu Gönder →</button>
        </div>
      </div>
    `;
    window._scCoach = c;

    const statsWrap = document.getElementById('scStatsWrap');
    const statsEl = document.getElementById('scStats');
    if (statsWrap && statsEl) {
      if (statsEl.scrollWidth <= statsEl.clientWidth + 1) statsWrap.classList.add('sc-no-overflow');
    }
  }

  function firstLine(s){
    const line = String(s||'').split('\n')[0].trim();
    return line.length > 42 ? line.slice(0,41).trim() + '…' : line;
  }
  function scTab(t){
    const p = window._scCoach?.profile || {};
    const map = { bio: p.bio||'Biyografi henüz eklenmedi.', edu: p.education||'Eğitim bilgisi eklenmedi.', exp: p.experience||'Deneyim bilgisi eklenmedi.' };
    document.querySelectorAll('.sc-tab').forEach(b=>b.classList.toggle('on', b.dataset.t===t));
    document.getElementById('scPanel').innerHTML = esc(map[t]).replace(/\n/g,'<br>');
  }
  function openScApply(){ document.getElementById('scApplySheet').classList.add('on'); }
  function scMaskPhone(el){
    let d=el.value.replace(/\D/g,''); if(d.startsWith('0'))d=d.slice(1); d=d.slice(0,10);
    let o=''; if(d.length)o='0 ('+d.slice(0,3); if(d.length>=3)o+=') '+d.slice(3,6); if(d.length>=6)o+=' '+d.slice(6,8); if(d.length>=8)o+=' '+d.slice(8,10);
    el.value=o;
  }
  async function submitScApply(){
    const coachId=document.getElementById('scApplyCoach').value;
    const name=document.getElementById('scName').value.trim();
    const phone=document.getElementById('scPhone').value.trim();
    const email=document.getElementById('scEmail').value.trim();
    const goal=document.getElementById('scGoal').value.trim();
    if(!name || phone.replace(/\D/g,'').length<10) return showToast('Ad ve geçerli WhatsApp numarası gerekli.');
    try{
      const { error } = await db.from('match_requests').insert({
        student_name:name, phone, email:email||null, goal:goal||null,
        exam_profile:'YKS', status:'pending', matched_coach_id:coachId
      });
      if(error) throw error;
      document.getElementById('scApplySheet').classList.remove('on');

      const c = window._scCoach || {};
      const p = c.profile || {};
      const waNum = (p.whatsapp_number || '').replace(/\D/g, '');
      const waLink = waNum
        ? `https://wa.me/90${waNum.slice(-10)}?text=${encodeURIComponent(`Merhaba ${c.name || 'Hocam'}, Rostrum Akademi tanıtım sayfanız üzerinden ön başvuru yaptım: ${name}`)}`
        : null;

      document.getElementById('showcaseContainer').innerHTML = `
        <div style="max-width:460px;margin:60px auto;text-align:center;padding:32px 24px;font-family:-apple-system,sans-serif;color:#1A1714">
          <div style="font-size:56px;margin-bottom:14px">🎉</div>
          <div style="font-size:22px;font-weight:800;margin-bottom:8px">Başvurun Alındı!</div>
          <div style="font-size:14px;color:#6B6560;line-height:1.6;margin-bottom:24px">${esc(name)}, <b>${esc(c.name||'Koçun')}</b> başvurunu gördüğünde seninle iletişime geçecek. Başarılar! 🚀</div>
          ${waLink ? `
            <a href="${waLink}" target="_blank" style="display:inline-flex;align-items:center;justify-content:center;gap:8px;background:#25D366;color:#fff;font-weight:800;font-size:15px;padding:14px 22px;border-radius:14px;text-decoration:none;box-shadow:0 4px 16px rgba(37,211,102,0.35);">
              💬 Koçunla WhatsApp'tan Anında Mesajlaş →
            </a>
          ` : ''}
        </div>`;
    }catch(e){ showToast('Gönderilemedi: '+e.message); }
  }

  // Derin link varsa profil sorgusu koç listesini beklemeden hemen başlasın
  // (openDeepLink zaten allCoaches boşsa doğrudan RPC'ye düşüyor) — liste
  // tüm sayfa kaynakları yüklenene kadar (window.onload) beklemeye devam eder.
  openDeepLink();
  window.onload = async () => { await loadCoaches(); };
</script>
</body>
</html>

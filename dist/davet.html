<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Öğrenci Kaydı — Rostrum Akademi</title>
  <meta name="description" content="Koçunuzun davetiyle Rostrum Akademi'ye katılın.">
  <link rel="icon" href="/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #E8613A;
      --dark: #0F0E17;
      --surface: #1A1920;
      --surface2: #222130;
      --border: rgba(255,255,255,.08);
      --text: #F0EFF8;
      --muted: #6B6A7A;
      --green: #22C55E;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .topbar {
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0;
      background: rgba(15,14,23,.9);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo { font-size: 18px; font-weight: 800; color: var(--text); letter-spacing: -.3px; }
    .logo span { color: var(--brand); }

    /* ── MAIN LAYOUT ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      max-width: 500px;
      margin: 0 auto;
      width: 100%;
      padding: 40px 20px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      box-shadow: 0 24px 80px rgba(0,0,0,.5);
      width: 100%;
    }

    .card-title {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
    }
    .card-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
      line-height: 1.5;
      text-align: center;
    }
    .card-sub strong { color: var(--brand); }

    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 6px;
    }
    .field input, .field select {
      width: 100%;
      padding: 13px 16px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    .field input:focus, .field select:focus { border-color: var(--brand); }
    .field input::placeholder { color: var(--muted); }
    .field input:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Color picker style */
    .color-pick { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 4px; }
    .color-opt { width: 34px; height: 34px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: transform .1s; }
    .color-opt:hover { transform: scale(1.08); }
    .color-opt.sel { border-color: #fff; transform: scale(1.1); box-shadow: 0 0 10px rgba(255,255,255,.3); }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      letter-spacing: .02em;
      transition: opacity .15s, transform .1s;
      font-family: inherit;
    }
    .btn-primary:hover { opacity: .9; }
    .btn-primary:active { transform: scale(.98); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

    /* Error / Success states */
    .msg {
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
      line-height: 1.45;
    }
    .msg.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.25); color: #FCA5A5; }
    .msg.success { background: rgba(34,197,94,.1); border: 1px solid rgba(34,197,94,.25); color: #86EFAC; }

    /* Loading state */
    .loading-spinner {
      text-align: center;
      padding: 40px 0;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="logo">Rostrum<span>Akademi</span></div>
  </header>

  <main>
    <div class="card" id="mainCard">
      <!-- Loading State -->
      <div id="loader" class="loading-spinner">
        Davet kontrol ediliyor, lütfen bekleyin...
      </div>

      <!-- Error State -->
      <div id="errorBox" class="msg error"></div>

      <!-- Form State -->
      <div id="formContainer" style="display: none;">
        <h2 class="card-title">Aramıza Hoş Geldin!</h2>
        <p class="card-sub"><strong id="coachNameDisplay">Koçunuz</strong> sizi Rostrum Akademi'ye davet etti. Hesabınızı tamamlayın.</p>

        <form id="inviteForm">
          <div class="field">
            <label>E-posta Adresi</label>
            <input type="email" id="email" disabled>
          </div>

          <div class="field" id="nameField">
            <label>Adınız Soyadınız</label>
            <input type="text" id="fullName" placeholder="Ad Soyad girin" required>
          </div>

          <div class="field">
            <label>Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="kullaniciadi" required>
          </div>

          <div class="field">
            <label>Şifre</label>
            <input type="password" id="password" placeholder="En az 8 karakter" minlength="8" required>
          </div>

          <div class="field">
            <label>Hedef / Program</label>
            <input type="text" id="target" placeholder="Örn: TYT / AYT Hedefli, Boğaziçi Bilgisayar">
          </div>

          <div class="field">
            <label>Alan (YKS)</label>
            <select id="yksArea">
              <option value="SAY">Sayısal (SAY)</option>
              <option value="EA">Eşit Ağırlık (EA)</option>
              <option value="SOZ">Sözel (SÖZ)</option>
              <option value="DIL">YDT Dil (DİL)</option>
            </select>
          </div>

          <div class="field">
            <label>Hafta Başlangıcı</label>
            <select id="weekStart">
              <option value="0">Pazartesi</option>
              <option value="1">Salı</option>
              <option value="2">Çarşamba</option>
              <option value="3">Perşembe</option>
              <option value="4">Cuma</option>
              <option value="5">Cumartesi</option>
              <option value="6">Pazar</option>
            </select>
          </div>

          <div class="field">
            <label>Profil Rengi</label>
            <div class="color-pick" id="colorPick">
              <div class="color-opt sel" data-c="#e8622a" style="background:#e8622a"></div>
              <div class="color-opt" data-c="#4da6ff" style="background:#4da6ff"></div>
              <div class="color-opt" data-c="#3ecf8e" style="background:#3ecf8e"></div>
              <div class="color-opt" data-c="#c084fc" style="background:#c084fc"></div>
              <div class="color-opt" data-c="#f472b6" style="background:#f472b6"></div>
              <div class="color-opt" data-c="#f0a500" style="background:#f0a500"></div>
            </div>
          </div>

          <div id="msgBox" class="msg error"></div>

          <button type="submit" id="submitBtn" class="btn-primary">Kaydı Tamamla & Giriş Yap →</button>
        </form>
      </div>

      <!-- Success State -->
      <div id="successContainer" style="display: none; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 16px;">🎉</div>
        <h2 class="card-title" style="margin-bottom: 12px;">Kaydınız Başarıyla Tamamlandı!</h2>
        <p class="card-sub">Hesabınız oluşturuldu. Panele yönlendiriliyorsunuz...</p>
      </div>
    </div>
  </main>

  <script>
    // CONFIG is already loaded from config.js globally
    const db = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    let inviteData = null;

    async function init() {
      const loader = document.getElementById('loader');
      const errorBox = document.getElementById('errorBox');
      const formContainer = document.getElementById('formContainer');

      if (!token) {
        loader.style.display = 'none';
        errorBox.textContent = 'Davet kodu bulunamadı. Lütfen koçunuzdan yeni bir davet bağlantısı isteyin.';
        errorBox.style.display = 'block';
        return;
      }

      try {
        // Query the invitation
        const { data, error } = await db
          .from('student_invitations')
          .select('*')
          .eq('token', token)
          .maybeSingle();

        if (error) throw error;

        if (!data) {
          loader.style.display = 'none';
          errorBox.textContent = 'Davet kodu geçersiz. Lütfen doğru bağlantıyı kullandığınızdan emin olun.';
          errorBox.style.display = 'block';
          return;
        }

        // Check expiration
        if (new Date(data.expires_at) < new Date()) {
          loader.style.display = 'none';
          errorBox.textContent = 'Bu davet bağlantısının süresi dolmuş. Lütfen koçunuzdan yeni bir davet isteyin.';
          errorBox.style.display = 'block';
          return;
        }

        // Check if used
        if (data.used_at) {
          loader.style.display = 'none';
          errorBox.textContent = 'Bu davet bağlantısı zaten kullanılmış. Lütfen kendi şifrenizle giriş yapın.';
          errorBox.style.display = 'block';
          return;
        }

        inviteData = data;

        // Set inputs
        document.getElementById('email').value = data.email;
        if (data.student_name) {
          document.getElementById('fullName').value = data.student_name;
          document.getElementById('fullName').disabled = true;
        }
        if (data.username) {
          document.getElementById('username').value = data.username;
          document.getElementById('username').disabled = true;
        } else {
          // Generate fallback username from email
          const emailPrefix = data.email.split('@')[0].toLowerCase().replace(/[^a-z0-9]/g, '');
          document.getElementById('username').value = emailPrefix;
        }

        // Fetch coach name separately to avoid relation errors
        let coachName = 'Koçunuz';
        const { data: coachData } = await db
          .from('users')
          .select('full_name')
          .eq('id', data.coach_id)
          .maybeSingle();
          
        if (coachData && coachData.full_name) {
          coachName = coachData.full_name;
        }
        document.getElementById('coachNameDisplay').textContent = coachName;

        loader.style.display = 'none';
        formContainer.style.display = 'block';

      } catch (err) {
        console.error('Verify invitation error:', err);
        loader.style.display = 'none';
        errorBox.textContent = 'Davet doğrulanırken teknik bir sorun oluştu. Lütfen tekrar deneyin.';
        errorBox.style.display = 'block';
      }
    }

    // Color picker click listener
    document.getElementById('colorPick').addEventListener('click', function(e) {
      const o = e.target.closest('.color-opt');
      if(!o) return;
      document.querySelectorAll('#colorPick .color-opt').forEach(el => el.classList.remove('sel'));
      o.classList.add('sel');
    });

    document.getElementById('inviteForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msgBox = document.getElementById('msgBox');
      const submitBtn = document.getElementById('submitBtn');
      msgBox.style.display = 'none';

      const fullName = document.getElementById('fullName').value.trim();
      const usernameInput = document.getElementById('username').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
      const password = document.getElementById('password').value;
      const target = document.getElementById('target').value.trim() || 'Hedef belirtilmemiş';
      const yksArea = document.getElementById('yksArea').value;
      const weekStart = Number(document.getElementById('weekStart').value);
      const color = document.querySelector('#colorPick .color-opt.sel')?.dataset.c || '#e8622a';

      if (password.length < 8) {
        msgBox.textContent = 'Şifreniz en az 8 karakter olmalıdır.';
        msgBox.style.display = 'block';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Kaydınız yapılıyor...';

      try {
        const { data: authData, error: signUpErr } = await db.auth.signUp({
          email: inviteData.email,
          password: password,
          options: {
            data: {
              full_name: fullName,
              role: 'student'
            }
          }
        });

        if (signUpErr) throw signUpErr;

        const userId = authData.user.id;

        // Upsert the public.users record
        const { error: profileErr } = await db
          .from('users')
          .upsert({
            id: userId,
            full_name: fullName,
            username: usernameInput,
            password_hash: 'supabase_managed',
            role: 'student',
            email: inviteData.email,
            coach_id: inviteData.coach_id,
            color: color,
            target: target,
            progress: 0,
            week_start: weekStart,
            exam_profile: 'YKS'
          });

        if (profileErr) throw profileErr;

        // Update student_profiles (YKS Area, onboarding status)
        const { error: studProfileErr } = await db
          .from('student_profiles')
          .upsert({
            id: userId,
            target_rank: null,
            student_email: inviteData.email,
            onboarding_done: false,
            yks_area: yksArea
          });

        // Mark invitation as used
        const response = await fetch('/api/invitation?action=accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, userId: userId })
        });

        if (!response.ok) {
          const apiErr = await response.json();
          throw new Error(apiErr.error || 'Davet güncellenemedi');
        }

        // Show Success
        document.getElementById('formContainer').style.display = 'none';
        document.getElementById('successContainer').style.display = 'block';

        // Auto login variables
        sessionStorage.setItem('ra_new_coach_email', inviteData.email);
        sessionStorage.setItem('ra_new_coach_pass', password);

        setTimeout(() => {
          window.location.href = '/app.html?new_coach=1';
        }, 2000);

      } catch (err) {
        console.error('Signup error:', err);
        msgBox.textContent = err.message || 'Kayıt sırasında bir hata oluştu. Lütfen tekrar deneyin.';
        msgBox.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Kaydı Tamamla & Giriş Yap →';
      }
    });

    init();
  </script>
</body>
</html>
